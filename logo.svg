<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a96a"/>
      <stop offset="100%" stop-color="#b8863e"/>
    </linearGradient>
    <linearGradient id="scrollDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a67c3d"/>
      <stop offset="100%" stop-color="#8a6530"/>
    </linearGradient>
    <linearGradient id="gem1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#5a3ec8"/>
    </linearGradient>
    <linearGradient id="gem2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00cc88"/>
      <stop offset="100%" stop-color="#009966"/>
    </linearGradient>
    <linearGradient id="gem3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8844"/>
      <stop offset="100%" stop-color="#dd6622"/>
    </linearGradient>
    <linearGradient id="bookmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Subtle pattern overlay -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#dots)"/>

  <!-- Decorative corner accents -->
  <path d="M40 80 L80 40" stroke="#334" stroke-width="2" opacity="0.5"/>
  <path d="M40 90 L90 40" stroke="#334" stroke-width="1.5" opacity="0.3"/>
  <path d="M472 80 L432 40" stroke="#334" stroke-width="2" opacity="0.5"/>
  <path d="M472 90 L422 40" stroke="#334" stroke-width="1.5" opacity="0.3"/>
  <path d="M40 432 L80 472" stroke="#334" stroke-width="2" opacity="0.5"/>
  <path d="M40 422 L90 472" stroke="#334" stroke-width="1.5" opacity="0.3"/>
  <path d="M472 432 L432 472" stroke="#334" stroke-width="2" opacity="0.5"/>
  <path d="M472 422 L422 472" stroke="#334" stroke-width="1.5" opacity="0.3"/>

  <!-- Scroll body (main parchment) -->
  <g filter="url(#shadow)">
    <!-- Main scroll area -->
    <rect x="120" y="90" width="272" height="340" rx="6" fill="url(#scroll)"/>

    <!-- Scroll texture lines -->
    <line x1="140" y1="110" x2="372" y2="110" stroke="#c4995a" stroke-width="0.5" opacity="0.5"/>
    <line x1="140" y1="130" x2="372" y2="130" stroke="#c4995a" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="340" x2="372" y2="340" stroke="#c4995a" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="360" x2="372" y2="360" stroke="#c4995a" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="380" x2="372" y2="380" stroke="#c4995a" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="400" x2="372" y2="400" stroke="#c4995a" stroke-width="0.5" opacity="0.3"/>

    <!-- Top scroll roll -->
    <ellipse cx="256" cy="90" rx="150" ry="18" fill="url(#scrollDark)"/>
    <ellipse cx="256" cy="90" rx="150" ry="14" fill="url(#scroll)"/>
    <ellipse cx="256" cy="90" rx="150" ry="10" fill="url(#scrollDark)" opacity="0.3"/>

    <!-- Bottom scroll roll -->
    <ellipse cx="256" cy="430" rx="150" ry="18" fill="url(#scrollDark)"/>
    <ellipse cx="256" cy="430" rx="150" ry="14" fill="url(#scroll)"/>
    <ellipse cx="256" cy="430" rx="150" ry="10" fill="url(#scrollDark)" opacity="0.3"/>

    <!-- Scroll roll end caps -->
    <circle cx="106" cy="90" r="14" fill="url(#scrollDark)"/>
    <circle cx="406" cy="90" r="14" fill="url(#scrollDark)"/>
    <circle cx="106" cy="430" r="14" fill="url(#scrollDark)"/>
    <circle cx="406" cy="430" r="14" fill="url(#scrollDark)"/>
    <circle cx="106" cy="90" r="8" fill="#8a6530" opacity="0.6"/>
    <circle cx="406" cy="90" r="8" fill="#8a6530" opacity="0.6"/>
    <circle cx="106" cy="430" r="8" fill="#8a6530" opacity="0.6"/>
    <circle cx="406" cy="430" r="8" fill="#8a6530" opacity="0.6"/>
  </g>

  <!-- Item rows on the scroll -->
  <!-- Row 1: Purple/Epic item -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="#2a2040" stroke="#7b68ee" stroke-width="2"/>
    <polygon points="18,6 22,14 30,15 24,21 25,30 18,26 11,30 12,21 6,15 14,14" fill="url(#gem1)" opacity="0.9"/>
    <rect x="46" y="6" width="140" height="10" rx="3" fill="#7b68ee" opacity="0.7"/>
    <rect x="46" y="22" width="80" height="6" rx="2" fill="#9a8866" opacity="0.3"/>
    <!-- Checkmark -->
    <g transform="translate(200, 8)">
      <circle cx="8" cy="8" r="10" fill="#00cc88" opacity="0.2"/>
      <polyline points="3,9 7,13 14,4" stroke="#00cc88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Row 2: Green/Uncommon item -->
  <g transform="translate(150, 210)">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="#1a3020" stroke="#1eff00" stroke-width="2"/>
    <rect x="8" y="8" width="20" height="20" rx="2" fill="url(#gem2)" opacity="0.8"/>
    <rect x="12" y="12" width="12" height="12" rx="6" fill="#00ffaa" opacity="0.3"/>
    <rect x="46" y="6" width="120" height="10" rx="3" fill="#1eff00" opacity="0.7"/>
    <rect x="46" y="22" width="100" height="6" rx="2" fill="#9a8866" opacity="0.3"/>
    <!-- Checkmark -->
    <g transform="translate(200, 8)">
      <circle cx="8" cy="8" r="10" fill="#00cc88" opacity="0.2"/>
      <polyline points="3,9 7,13 14,4" stroke="#00cc88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Row 3: Orange/Legendary item -->
  <g transform="translate(150, 270)">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="#302010" stroke="#ff8000" stroke-width="2"/>
    <polygon points="18,4 24,16 34,16 26,24 29,34 18,28 7,34 10,24 2,16 12,16" fill="url(#gem3)" opacity="0.85" transform="scale(0.85) translate(3,2)"/>
    <rect x="46" y="6" width="100" height="10" rx="3" fill="#ff8000" opacity="0.7"/>
    <rect x="46" y="22" width="130" height="6" rx="2" fill="#9a8866" opacity="0.3"/>
    <!-- Checkmark -->
    <g transform="translate(200, 8)">
      <circle cx="8" cy="8" r="10" fill="#00cc88" opacity="0.2"/>
      <polyline points="3,9 7,13 14,4" stroke="#00cc88" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Row 4: Blue/Rare item (partially visible, fading) -->
  <g transform="translate(150, 330)" opacity="0.5">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="#102040" stroke="#0070dd" stroke-width="2"/>
    <circle cx="18" cy="18" r="12" fill="#0070dd" opacity="0.5"/>
    <circle cx="18" cy="18" r="6" fill="#00aaff" opacity="0.4"/>
    <rect x="46" y="6" width="110" height="10" rx="3" fill="#0070dd" opacity="0.7"/>
    <rect x="46" y="22" width="70" height="6" rx="2" fill="#9a8866" opacity="0.3"/>
  </g>

  <!-- Bookmark ribbon on top-right -->
  <g filter="url(#glow)">
    <path d="M360 60 L360 155 L378 138 L396 155 L396 60 Z" fill="url(#bookmark)" opacity="0.9"/>
    <path d="M360 60 L396 60" stroke="#00eeff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Small sparkle accents -->
  <g fill="#fff" opacity="0.6">
    <circle cx="100" cy="180" r="1.5"/>
    <circle cx="415" cy="250" r="2"/>
    <circle cx="90" cy="350" r="1"/>
    <circle cx="420" cy="150" r="1.5"/>
    <circle cx="440" cy="350" r="1"/>
  </g>

  <!-- Star sparkle near bookmark -->
  <g transform="translate(410, 100)" fill="#00ccff" opacity="0.5">
    <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5"/>
  </g>
  <g transform="translate(85, 260)" fill="#7b68ee" opacity="0.4">
    <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2"/>
  </g>
</svg>
